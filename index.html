<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>查房助手</title>
<style>
:root{
  --p:#2563eb;--pd:#1d4ed8;--pl:#dbeafe;
  --g:#16a34a;--gl:#dcfce7;
  --w:#d97706;--wl:#fef3c7;
  --r:#dc2626;--rl:#fee2e2;
  --o:#ea580c;--ol:#ffedd5;
  --pu:#7c3aed;--pul:#ede9fe;
  --g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;--g300:#d1d5db;
  --g400:#9ca3af;--g500:#6b7280;--g600:#4b5563;--g700:#374151;--g800:#1f2937;
  --rad:12px;--sh:0 1px 3px rgba(0,0,0,.10),0 1px 2px rgba(0,0,0,.06);
  --shl:0 10px 25px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;
  background:var(--g100);color:var(--g800);min-height:100vh;max-width:480px;margin:0 auto}
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}
.scr-body{flex:1;overflow-y:auto}

/* ── Topbar ── */
.topbar{background:var(--p);color:#fff;padding:16px 16px 14px;display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:100}
.tb-back{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:0 4px;line-height:1}
.tb-title{font-size:17px;font-weight:600;flex:1}
.tb-act{background:none;border:none;color:#fff;font-size:13px;cursor:pointer;padding:4px 8px;
  border:1px solid rgba(255,255,255,.4);border-radius:6px}

/* ── Bottom Nav ── */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
  background:#fff;border-top:1px solid var(--g200);display:grid;z-index:100}
.bnav.cols3{grid-template-columns:repeat(3,1fr)}
.bnav.cols4{grid-template-columns:repeat(4,1fr)}
.nb{display:flex;flex-direction:column;align-items:center;padding:8px 0 14px;
  background:none;border:none;cursor:pointer;color:var(--g400);font-size:10px;gap:2px;transition:color .15s}
.nb .ni{font-size:20px}
.nb.on{color:var(--p)}

/* ── Cards / Sections ── */
.card{background:#fff;border-radius:var(--rad);box-shadow:var(--sh);overflow:hidden;margin-bottom:12px}
.card-hd{padding:12px 16px;background:var(--g50);border-bottom:1px solid var(--g100);
  display:flex;align-items:center;gap:8px}
.card-hd-icon{font-size:17px}
.card-hd-title{font-size:14px;font-weight:600;color:var(--g700);flex:1}
.card-hd-note{font-size:12px;color:var(--g400)}

/* ── Buttons ── */
.btn{border:none;border-radius:10px;padding:13px 18px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn:active{opacity:.82}
.btn-primary{background:var(--p);color:#fff}
.btn-success{background:var(--g);color:#fff}
.btn-danger{background:var(--r);color:#fff}
.btn-ghost{background:var(--g100);color:var(--g700);border:1.5px solid var(--g200)}
.btn-warn{background:var(--w);color:#fff}
.btn-sm{padding:6px 14px;font-size:13px;border-radius:8px}
.btn-xs{padding:4px 10px;font-size:12px;border-radius:6px}

/* ── Login ── */
#sl{background:linear-gradient(145deg,#1d4ed8,#2563eb 50%,#3b82f6);
  justify-content:center;align-items:center;padding:40px 32px}
.l-logo{font-size:56px;margin-bottom:8px}
.l-name{font-size:26px;font-weight:700;color:#fff;margin-bottom:4px}
.l-sub{font-size:13px;color:rgba(255,255,255,.7);margin-bottom:40px}
.l-role{display:flex;gap:10px;margin-bottom:28px;width:100%}
.role-btn{flex:1;padding:11px;border-radius:10px;border:2px solid rgba(255,255,255,.35);
  background:rgba(255,255,255,.12);color:#fff;font-size:14px;font-weight:600;cursor:pointer;
  transition:all .15s}
.role-btn.sel{background:rgba(255,255,255,.3);border-color:rgba(255,255,255,.8)}
.l-field{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);border-radius:10px;
  padding:14px 16px;color:#fff;font-size:15px;width:100%;margin-bottom:12px;outline:none}
.l-field::placeholder{color:rgba(255,255,255,.55)}
.l-field:focus{border-color:rgba(255,255,255,.7);background:rgba(255,255,255,.2)}
.l-btn{width:100%;background:#fff;color:var(--pd);border:none;border-radius:10px;padding:15px;
  font-size:16px;font-weight:700;cursor:pointer}

/* ── Dashboard ── */
.dash-hd{background:var(--p);padding:16px 16px 20px;color:#fff}
.dash-hi{font-size:13px;opacity:.8;margin-bottom:2px}
.dash-dt{font-size:17px;font-weight:600;margin-bottom:16px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.stat{background:rgba(255,255,255,.18);border-radius:10px;padding:10px 6px;text-align:center}
.stat-n{font-size:22px;font-weight:700;line-height:1}
.stat-l{font-size:11px;opacity:.8;margin-top:3px}
.dash-bd{padding:14px 16px 90px}
.sec-ttl{font-size:12px;font-weight:600;color:var(--g500);letter-spacing:.5px;
  text-transform:uppercase;margin:4px 0 10px}

/* Room grid */
.room-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.rc{background:#fff;border-radius:var(--rad);padding:14px 10px 12px;text-align:center;
  box-shadow:var(--sh);cursor:pointer;transition:transform .15s;position:relative;
  overflow:hidden;border:2px solid transparent}
.rc:active{transform:scale(.96)}
.rc.s-pending{border-color:var(--g200)}
.rc.s-normal{border-color:var(--g);background:var(--gl)}
.rc.s-abnormal{border-color:var(--r);background:var(--rl)}
.rc.s-progress{border-color:var(--p);background:var(--pl)}
.rc-num{font-size:20px;font-weight:700;color:var(--g800)}
.rc-type{font-size:11px;color:var(--g500);margin:2px 0 6px}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.b-pending{background:var(--g200);color:var(--g600)}
.b-progress{background:var(--pl);color:var(--pd)}
.b-normal{background:var(--gl);color:var(--g)}
.b-abnormal{background:var(--rl);color:var(--r)}
.rc-issues{position:absolute;top:5px;right:5px;background:var(--r);color:#fff;
  font-size:10px;font-weight:700;width:18px;height:18px;border-radius:50%;
  display:flex;align-items:center;justify-content:center}
.ab-row{background:#fff;border-radius:var(--rad);box-shadow:var(--sh);padding:12px 16px;
  margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:10px}
.ab-num{font-size:18px;font-weight:700;color:var(--r);min-width:36px}
.ab-info{flex:1;font-size:13px;color:var(--g600)}
.ab-arr{color:var(--g300);font-size:18px}

/* ── Inspect ── */
#sinspect{background:var(--g50)}
.room-bar{background:#fff;border-radius:var(--rad);padding:14px 16px;margin-bottom:14px;
  box-shadow:var(--sh);display:flex;align-items:center;gap:12px}
.room-bar-num{font-size:28px;font-weight:700;color:var(--p)}
.room-bar-info{flex:1}
.room-bar-name{font-size:15px;font-weight:600}
.room-bar-type{font-size:12px;color:var(--g500);margin-top:2px}

/* Check items */
.ci{padding:14px 16px;border-bottom:1px solid var(--g100);display:flex;align-items:flex-start;gap:12px}
.ci:last-child{border-bottom:none}
.ci-info{flex:1}
.ci-name{font-size:14px;font-weight:500}
.ci-desc{font-size:12px;color:var(--g500);margin-top:2px}
.ci-tog{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.tog{font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;
  border:1.5px solid var(--g300);background:none;cursor:pointer;color:var(--g600);transition:all .15s}
.tog.t-ok{background:var(--g);border-color:var(--g);color:#fff}
.tog.t-issue{background:var(--r);border-color:var(--r);color:#fff}
.tog.t-na{background:var(--g400);border-color:var(--g400);color:#fff}

/* ── Inventory table ── */
.inv-table{width:100%;border-collapse:collapse;font-size:13px}
.inv-table th{background:var(--g50);padding:8px 10px;font-size:11px;font-weight:600;
  color:var(--g500);text-align:center;border-bottom:1px solid var(--g200)}
.inv-table td{padding:10px 8px;border-bottom:1px solid var(--g100);text-align:center;vertical-align:middle}
.inv-table tr:last-child td{border-bottom:none}
.inv-table td.left{text-align:left;padding-left:14px}
.inv-num-in{width:52px;border:1.5px solid var(--g200);border-radius:8px;
  padding:6px;text-align:center;font-size:14px;font-weight:700;
  color:var(--g800);background:var(--g50);outline:none}
.inv-num-in:focus{border-color:var(--p);background:#fff}
.inv-consumed{font-size:14px;font-weight:700}
.inv-consumed.pos{color:var(--r)}
.inv-consumed.zero{color:var(--g400)}
.inv-price{font-size:13px;font-weight:600;color:var(--o)}
.inv-footer{background:var(--g50);padding:12px 16px;display:flex;align-items:center;
  justify-content:space-between;border-top:1px solid var(--g200)}
.inv-total-lbl{font-size:13px;color:var(--g600)}
.inv-total-val{font-size:18px;font-weight:700;color:var(--o)}

/* ── Photos ── */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 16px}
.ph-thumb{aspect-ratio:1;border-radius:8px;overflow:hidden;background:var(--g100);
  position:relative;cursor:pointer}
.ph-thumb img{width:100%;height:100%;object-fit:cover}
.ph-del{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.5);color:#fff;
  border:none;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
.ph-add{aspect-ratio:1;border-radius:8px;background:var(--g100);border:2px dashed var(--g300);
  cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;color:var(--g400);font-size:12px;transition:all .15s}
.ph-add:active{background:var(--pl);border-color:var(--p)}
.ph-add-icon{font-size:24px}

/* Remark */
.remark-wrap{padding:12px 16px}
.remark-in{width:100%;border:1.5px solid var(--g200);border-radius:8px;padding:10px 12px;
  font-size:14px;resize:none;font-family:inherit;color:var(--g800);background:var(--g50);
  outline:none;min-height:72px;transition:border-color .15s}
.remark-in:focus{border-color:var(--p);background:#fff}

/* Submit bar */
.sub-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;background:#fff;border-top:1px solid var(--g200);
  padding:12px 16px 20px;z-index:100;display:flex;gap:10px}

/* ── Report ── */
.rpt-sum{background:var(--p);color:#fff;border-radius:var(--rad);padding:20px;
  margin-bottom:14px;box-shadow:var(--shl)}
.rpt-title{font-size:16px;font-weight:700;margin-bottom:4px}
.rpt-dt{font-size:12px;opacity:.75;margin-bottom:16px}
.rpt-nums{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.rpt-ni{text-align:center}
.rpt-nv{font-size:22px;font-weight:700}
.rpt-nl{font-size:11px;opacity:.8;margin-top:2px}
.rpt-card{background:#fff;border-radius:var(--rad);margin-bottom:10px;overflow:hidden;box-shadow:var(--sh)}
.rpt-ch{padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--g100)}
.rpt-cn{font-size:20px;font-weight:700}
.rpt-ct{font-size:12px;color:var(--g500);flex:1}
.rpt-cb{padding:12px 16px}
.rpt-iss{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px;color:var(--r)}
.rpt-ok{font-size:12px;color:var(--g);padding:3px 0}
.rpt-photos{display:flex;gap:6px;overflow-x:auto;padding-top:8px}
.rpt-photo{width:58px;height:58px;border-radius:6px;object-fit:cover;flex-shrink:0}

/* ── History ── */
.hist-item{background:#fff;border-radius:var(--rad);padding:14px 16px;margin-bottom:10px;
  box-shadow:var(--sh);cursor:pointer;display:flex;align-items:center;gap:12px}
.hist-db{background:var(--pl);color:var(--pd);border-radius:8px;padding:8px 12px;
  text-align:center;min-width:48px}
.hist-day{font-size:22px;font-weight:700;line-height:1}
.hist-mo{font-size:11px;margin-top:2px}
.hist-info{flex:1}
.hist-staff{font-size:14px;font-weight:600}
.hist-detail{font-size:12px;color:var(--g500);margin-top:2px}

/* ═══════════════ ADMIN STYLES ═══════════════ */
.admin-hd{background:var(--pu);padding:16px 16px 14px;color:#fff;display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:100}
.admin-hd .tb-title{font-size:17px;font-weight:600;flex:1}

/* Admin tabs */
.atabs{display:flex;background:var(--g100);border-bottom:1px solid var(--g200);
  position:sticky;top:57px;z-index:99;overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none}
.atabs::-webkit-scrollbar{display:none}
.atab{flex:0 0 auto;padding:12px 14px;background:none;border:none;font-size:13px;
  font-weight:600;color:var(--g500);cursor:pointer;border-bottom:2px solid transparent;
  transition:all .15s;white-space:nowrap}
.atab.on{color:var(--pu);border-bottom-color:var(--pu)}
.atab-body{display:none;padding:14px 16px 100px}
.atab-body.on{display:block}

/* Product list */
.prod-item{background:#fff;border-radius:var(--rad);box-shadow:var(--sh);
  padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.prod-icon{font-size:28px;line-height:1}
.prod-info{flex:1}
.prod-name{font-size:15px;font-weight:600}
.prod-meta{font-size:12px;color:var(--g500);margin-top:3px}
.prod-price{font-size:16px;font-weight:700;color:var(--o);text-align:right}
.prod-price-lbl{font-size:11px;color:var(--g400);text-align:right}
.prod-acts{display:flex;gap:6px}
.add-fab{position:fixed;bottom:80px;right:calc(50% - 220px);background:var(--pu);color:#fff;
  border:none;border-radius:50%;width:52px;height:52px;font-size:24px;cursor:pointer;
  box-shadow:var(--shl);z-index:98;display:flex;align-items:center;justify-content:center}

/* Inventory admin */
.inv-admin-row{background:#fff;border-radius:var(--rad);box-shadow:var(--sh);
  padding:14px 16px;margin-bottom:10px}
.inv-a-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.inv-a-icon{font-size:24px}
.inv-a-name{font-size:15px;font-weight:600;flex:1}
.inv-a-cat{font-size:12px;color:var(--g500);background:var(--g100);
  padding:2px 8px;border-radius:10px}
.inv-a-fields{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.inv-a-field label{font-size:11px;color:var(--g500);display:block;margin-bottom:4px}
.inv-a-field input{width:100%;border:1.5px solid var(--g200);border-radius:8px;
  padding:8px 10px;font-size:15px;font-weight:700;text-align:center;
  color:var(--g800);outline:none;font-family:inherit}
.inv-a-field input:focus{border-color:var(--pu)}
.stock-bar{height:6px;background:var(--g200);border-radius:3px;margin-top:10px;overflow:hidden}
.stock-fill{height:100%;border-radius:3px;transition:width .4s}

/* Restock report */
.restock-sum{background:var(--o);color:#fff;border-radius:var(--rad);
  padding:16px;margin-bottom:14px;display:flex;align-items:center;gap:14px}
.restock-sum-icon{font-size:36px}
.restock-sum-info{}
.restock-sum-title{font-size:16px;font-weight:700}
.restock-sum-sub{font-size:12px;opacity:.8;margin-top:2px}
.restock-item{background:#fff;border-radius:var(--rad);box-shadow:var(--sh);
  padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.restock-icon{font-size:24px}
.restock-info{flex:1}
.restock-name{font-size:14px;font-weight:600}
.restock-detail{font-size:12px;color:var(--g500);margin-top:2px}
.restock-qty{text-align:right}
.restock-qty-num{font-size:20px;font-weight:700;color:var(--r)}
.restock-qty-lbl{font-size:11px;color:var(--g400)}
.restock-ok{background:var(--gl);border-radius:var(--rad);padding:16px;
  text-align:center;color:var(--g);font-weight:600;font-size:14px}

/* Form */
.form-row{margin-bottom:14px}
.form-lbl{font-size:13px;font-weight:600;color:var(--g700);margin-bottom:6px;display:block}
.form-input{width:100%;border:1.5px solid var(--g200);border-radius:10px;padding:12px 14px;
  font-size:15px;color:var(--g800);outline:none;font-family:inherit;background:var(--g50);
  transition:border-color .15s}
.form-input:focus{border-color:var(--p);background:#fff}
.form-select{width:100%;border:1.5px solid var(--g200);border-radius:10px;padding:12px 14px;
  font-size:15px;color:var(--g800);outline:none;font-family:inherit;background:var(--g50);
  appearance:none;-webkit-appearance:none}
.form-hint{font-size:12px;color:var(--g400);margin-top:4px}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ── Modal / Drawer ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;
  display:none;align-items:flex-end}
.overlay.open{display:flex}
.drawer{background:#fff;border-radius:20px 20px 0 0;width:100%;
  padding:20px 20px 36px;max-height:88vh;overflow-y:auto}
.drawer-handle{width:36px;height:4px;background:var(--g300);border-radius:2px;margin:0 auto 16px}
.drawer-title{font-size:17px;font-weight:700;margin-bottom:16px}
.drawer-btns{display:flex;gap:10px;margin-top:20px}
.drawer-btns .btn{flex:1}
.modal-sm .drawer{max-height:50vh}

/* Toast */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-10px);
  background:var(--g800);color:#fff;padding:10px 20px;border-radius:20px;
  font-size:13px;opacity:0;transition:all .3s;z-index:999;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Misc */
.empty{text-align:center;padding:48px 24px;color:var(--g400)}
.empty-icon{font-size:48px;margin-bottom:12px}
.chip{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px}
.chip-warn{background:var(--wl);color:var(--w)}
.chip-danger{background:var(--rl);color:var(--r)}
.chip-ok{background:var(--gl);color:var(--g)}
.divider{height:1px;background:var(--g100);margin:4px 0}

/* ══ Barcode Scanner ══ */
.scan-overlay{position:fixed;inset:0;background:#000;z-index:300;display:none;flex-direction:column}
.scan-overlay.open{display:flex}
.scan-topbar{padding:56px 16px 12px;display:flex;align-items:center;gap:12px;
  background:linear-gradient(rgba(0,0,0,.7),transparent);
  position:absolute;top:0;left:0;right:0;z-index:10;color:#fff}
.scan-close{background:rgba(255,255,255,.18);border:none;color:#fff;width:38px;height:38px;
  border-radius:50%;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.scan-title{font-size:17px;font-weight:600;flex:1}
.scan-torch{background:rgba(255,255,255,.18);border:none;color:#fff;width:38px;height:38px;
  border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.scan-viewport{flex:1;position:relative;overflow:hidden;background:#000}
#scan-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.scan-darken{position:absolute;inset:0;background:rgba(0,0,0,.45);
  -webkit-mask:url(#scan-mask);mask:url(#scan-mask)}
.scan-frame{position:absolute;top:50%;left:50%;transform:translate(-50%,-56%);
  width:280px;height:170px;z-index:5}
.sc{position:absolute;width:26px;height:26px;border-color:#fff;border-style:solid}
.sc.tl{top:0;left:0;border-width:3px 0 0 3px;border-radius:3px 0 0 0}
.sc.tr{top:0;right:0;border-width:3px 3px 0 0;border-radius:0 3px 0 0}
.sc.bl{bottom:0;left:0;border-width:0 0 3px 3px;border-radius:0 0 0 3px}
.sc.br{bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 3px 0}
.scan-line{position:absolute;left:2px;right:2px;height:2px;
  background:linear-gradient(90deg,transparent,var(--p),#60a5fa,var(--p),transparent);
  box-shadow:0 0 10px rgba(37,99,235,.9);animation:scanline 2s ease-in-out infinite;top:10px}
@keyframes scanline{0%,100%{top:10px;opacity:.8}50%{top:calc(100% - 10px);opacity:1}}
.scan-bottom{position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(0,0,0,.85) 30%);
  padding:48px 20px 36px;z-index:10}
.scan-hint-txt{color:rgba(255,255,255,.8);font-size:13px;text-align:center;margin-bottom:16px}
.scan-manual-row{display:flex;gap:8px}
.scan-manual-in{flex:1;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.35);
  border-radius:10px;padding:12px;color:#fff;font-size:15px;outline:none;
  font-family:monospace;text-align:center;letter-spacing:2px}
.scan-manual-in::placeholder{color:rgba(255,255,255,.4);font-family:inherit;letter-spacing:0;font-size:13px}
.scan-manual-in:focus{border-color:rgba(255,255,255,.7);background:rgba(255,255,255,.2)}
.scan-manual-btn{background:var(--p);border:none;color:#fff;border-radius:10px;
  padding:12px 16px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}
.scan-status-banner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:20;text-align:center;pointer-events:none;display:none}
.scan-status-banner.show{display:block}
.scan-beep-ring{width:90px;height:90px;border-radius:50%;background:rgba(22,163,74,.9);
  display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 10px;
  animation:beep-ring .4s ease-out}
@keyframes beep-ring{0%{transform:scale(.7);opacity:.5}100%{transform:scale(1);opacity:1}}
.scan-beep-txt{color:#fff;font-size:15px;font-weight:600;
  background:rgba(0,0,0,.7);padding:6px 16px;border-radius:20px}
/* Product confirm drawer */
.pcd-header{display:flex;gap:14px;align-items:flex-start;margin-bottom:18px}
.pcd-img-wrap{position:relative;flex-shrink:0}
.pcd-img{width:80px;height:80px;border-radius:12px;object-fit:cover;
  background:var(--g100);border:2px solid var(--g200);display:block}
.pcd-img-btn{position:absolute;bottom:-6px;right:-6px;background:var(--p);color:#fff;
  border:none;border-radius:50%;width:24px;height:24px;font-size:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;box-shadow:var(--sh)}
.pcd-img-placeholder{width:80px;height:80px;border-radius:12px;background:var(--g100);
  border:2px dashed var(--g300);cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:4px;color:var(--g400);font-size:11px}
.pcd-img-placeholder .pi{font-size:24px}
.pcd-meta{flex:1;min-width:0}
.barcode-tag{display:inline-flex;align-items:center;gap:5px;background:var(--g800);
  color:rgba(255,255,255,.85);font-family:monospace;font-size:12px;
  padding:3px 9px;border-radius:6px;margin-bottom:8px}
.api-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;
  padding:2px 8px;border-radius:10px;margin-left:6px}
.api-tag.ok{background:var(--gl);color:var(--g)}
.api-tag.no{background:var(--rl);color:var(--r)}
.api-tag.spin{background:var(--pl);color:var(--pd)}
.api-source{font-size:11px;color:var(--g400);margin-top:4px}
/* ══ Cloud Sync Status ══ */
.sync-dot{display:inline-block;width:8px;height:8px;border-radius:50%;
  background:var(--g300);margin-right:3px;vertical-align:middle;transition:background .3s}
.sync-dot.online{background:#22c55e}
.sync-dot.syncing{background:#f59e0b;animation:pulse .8s ease-in-out infinite}
.sync-dot.error{background:var(--r)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.fb-code-area{width:100%;border:1.5px solid var(--g200);border-radius:10px;
  padding:12px 14px;font-size:12px;font-family:monospace;color:var(--g800);
  background:var(--g50);outline:none;resize:vertical;min-height:120px;
  transition:border-color .15s}
.fb-code-area:focus{border-color:var(--p);background:#fff}
.fb-step{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--g100)}
.fb-step:last-child{border-bottom:none}
.fb-step-num{background:var(--p);color:#fff;border-radius:50%;width:22px;height:22px;
  font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.fb-step-txt{font-size:13px;color:var(--g700);line-height:1.6}
.fb-step-txt a{color:var(--p)}

/* ══ Room Settings ══ */
.room-cfg-item{background:#fff;border-radius:var(--rad);box-shadow:var(--sh);
  padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.room-cfg-num{font-size:22px;font-weight:700;color:var(--p);min-width:46px}
.room-cfg-type{flex:1;font-size:14px;color:var(--g700)}
.room-cfg-acts{display:flex;gap:6px}
.room-cfg-floor{font-size:11px;color:var(--g400);background:var(--g100);
  padding:2px 8px;border-radius:8px;margin-left:4px}
.rooms-batch{background:var(--pul);border-radius:var(--rad);padding:14px 16px;
  margin-bottom:14px}
.rooms-batch-title{font-size:13px;font-weight:700;color:var(--pu);margin-bottom:10px}
.rooms-batch-row{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:8px;align-items:end}
.rooms-empty{text-align:center;padding:40px 24px;color:var(--g400)}

/* ══ Staff Management ══ */
.staff-item{background:#fff;border-radius:var(--rad);box-shadow:var(--sh);
  padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.staff-avatar{width:38px;height:38px;border-radius:50%;background:var(--pl);
  display:flex;align-items:center;justify-content:center;font-size:18px;
  color:var(--p);font-weight:700;flex-shrink:0}
.staff-name{font-size:15px;font-weight:600;flex:1}
.staff-acts{display:flex;gap:6px}

/* Scan FAB group */
.fab-group{position:fixed;bottom:80px;right:calc(50% - 220px);z-index:98;
  display:flex;flex-direction:column;gap:10px;align-items:flex-end}
.fab-main{background:var(--pu);color:#fff;border:none;border-radius:50%;
  width:52px;height:52px;font-size:24px;cursor:pointer;box-shadow:var(--shl);
  display:flex;align-items:center;justify-content:center}
.fab-mini{background:#fff;color:var(--pu);border:2px solid var(--pu);border-radius:24px;
  padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:var(--sh);
  display:flex;align-items:center;gap:6px;white-space:nowrap;
  transition:all .15s;opacity:0;pointer-events:none;transform:translateX(10px)}
.fab-group.open .fab-mini{opacity:1;pointer-events:auto;transform:translateX(0)}
</style>
</head>

<!-- Firebase SDK must load BEFORE main script so firebase is defined when init runs -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
// ═══════════════════════════════════════════════════════
// DEFAULT DATA
// ═══════════════════════════════════════════════════════
const DEFAULT_PRODUCTS = [
  {id:'p1', name:'矿泉水',  cat:'饮料', price:5,  unit:'瓶', icon:'💧', parLevel:2},
  {id:'p2', name:'可乐',    cat:'饮料', price:6,  unit:'罐', icon:'🥤', parLevel:1},
  {id:'p3', name:'果汁',    cat:'饮料', price:8,  unit:'瓶', icon:'🧃', parLevel:1},
  {id:'p4', name:'啤酒',    cat:'酒水', price:12, unit:'罐', icon:'🍺', parLevel:1},
  {id:'p5', name:'薯片',    cat:'零食', price:10, unit:'包', icon:'🥔', parLevel:1},
  {id:'p6', name:'饼干',    cat:'零食', price:8,  unit:'包', icon:'🍪', parLevel:1},
  {id:'p7', name:'坚果',    cat:'零食', price:15, unit:'包', icon:'🥜', parLevel:1},
  {id:'p8', name:'方便面',  cat:'零食', price:5,  unit:'包', icon:'🍜', parLevel:1},
];

const DEFAULT_STOCK = {p1:80,p2:40,p3:30,p4:20,p5:30,p6:30,p7:20,p8:20};

const DEFAULT_ROOM_DEFS = [
  {num:'101'},{num:'102'},{num:'103'},
  {num:'201'},{num:'202'},{num:'203'},{num:'204'},
  {num:'301'},{num:'302'},{num:'303'},{num:'304'},
  {num:'401'},
];
let ROOM_DEFS = JSON.parse(JSON.stringify(DEFAULT_ROOM_DEFS));

// 默认查房项目（扁平列表，保留旧 id 以兼容历史 roomData.checks）
const DEFAULT_CHECK_ITEMS = [
  {id:'tv',        name:'电视',         desc:'开机正常、遥控器可用、频道流畅', icon:'📺'},
  {id:'ac',        name:'空调',         desc:'制冷/制热正常、遥控可用、无异味', icon:'❄️'},
  {id:'kettle',    name:'热水壶/热水器', desc:'通电加热正常、壶体洁净',          icon:'☕'},
  {id:'computer',  name:'电脑',         desc:'正常开机进入系统、网络连接正常',  icon:'💻'},
  {id:'periph',    name:'电脑外设',     desc:'鼠标、键盘、音箱等完好可用',      icon:'🖱️'},
  {id:'floor',     name:'地面',         desc:'无灰尘、毛发、污渍',              icon:'🧹'},
  {id:'bed',       name:'床铺床品',     desc:'床单被罩洁净、枕套无污迹',        icon:'🛏️'},
  {id:'bathroom',  name:'卫生间',       desc:'马桶、洗手台、镜面、淋浴区洁净',  icon:'🚽'},
  {id:'furniture', name:'桌椅家具',     desc:'表面无灰尘、摆放整齐',            icon:'🪑'},
  {id:'trash',     name:'垃圾桶',       desc:'已清空，垃圾袋完好',              icon:'🗑️'},
  {id:'amenities', name:'一次性用品',   desc:'毛巾洗漱用品齐全',                icon:'🧴'},
];
let CHECK_ITEMS = JSON.parse(JSON.stringify(DEFAULT_CHECK_ITEMS));

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let currentUser = '', currentRole = 'staff';
let roomData = {};   // { roomNum: { status, checks, inventory, photos, remark, time, staff } }
let history  = [];
let loginRole = 'staff';

// ADMIN STATE (persisted)
let products = [];   // [{id,name,cat,price,unit,icon,parLevel}]
let stockData = {};  // { productId: totalQty }
let consumed  = {};  // today: { productId: totalConsumed }
let staffList = [];  // [{name, pwd}] 员工账号列表

function todayKey(){ return new Date().toISOString().slice(0,10); }

function loadAll(){
  try {
    const rm = localStorage.getItem('cfr_room_defs');
    if(rm){ ROOM_DEFS = JSON.parse(rm); }
    const rd = localStorage.getItem('cfr_rooms_'+todayKey());
    roomData = rd ? JSON.parse(rd) : {};
    const hi = localStorage.getItem('cfr_history');
    history = hi ? JSON.parse(hi) : [];
    const pr = localStorage.getItem('cfr_products');
    products = pr ? JSON.parse(pr) : JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));
    const sd = localStorage.getItem('cfr_stock');
    stockData = sd ? JSON.parse(sd) : Object.assign({},DEFAULT_STOCK);
    const co = localStorage.getItem('cfr_consumed_'+todayKey());
    consumed = co ? JSON.parse(co) : {};
    const sl = localStorage.getItem('cfr_staff');
    staffList = sl ? JSON.parse(sl) : [];
    // 查房项目：优先读新的扁平结构，否则尝试从旧 sections 迁移
    const ci = localStorage.getItem('cfr_check_items');
    if(ci){
      CHECK_ITEMS = JSON.parse(ci);
    } else {
      const old = localStorage.getItem('cfr_check_sections');
      if(old){
        try {
          const sections = JSON.parse(old);
          if(Array.isArray(sections)){
            const flat=[]; sections.forEach(s=>(s.items||[]).forEach(it=>flat.push({...it, icon: it.icon||s.icon||'✅'})));
            if(flat.length) CHECK_ITEMS = flat;
          }
        } catch(e){}
      }
    }
    const usr = localStorage.getItem('cfr_user');
    if(usr){ const u=JSON.parse(usr); currentUser=u.name; currentRole=u.role; }
  } catch(e){}
  ROOM_DEFS.forEach(r=>{ if(!roomData[r.num]) roomData[r.num]={status:'pending'}; });
}
function saveCheckItems(){
  localStorage.setItem('cfr_check_items', JSON.stringify(CHECK_ITEMS));
  if(db) fsSyncCheckItems().catch(()=>{});
}
function saveRoomDefs(){
  localStorage.setItem('cfr_room_defs', JSON.stringify(ROOM_DEFS));
  if(db) fsSyncRoomDefs().catch(()=>{});
}

function saveRooms(){
  localStorage.setItem('cfr_rooms_'+todayKey(), JSON.stringify(roomData));
  if(db) fsSyncRooms().catch(()=>{});
}
function saveAdmin(){
  localStorage.setItem('cfr_products', JSON.stringify(products));
  localStorage.setItem('cfr_stock', JSON.stringify(stockData));
  localStorage.setItem('cfr_consumed_'+todayKey(), JSON.stringify(consumed));
  if(db) fsSyncAdmin().catch(()=>{});
}
function saveStaff(){
  localStorage.setItem('cfr_staff', JSON.stringify(staffList));
  if(db) fsSyncStaff().catch(()=>{});
}

// ═══════════════════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════════════════
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function switchTab(tab){
  show('s'+tab);
  if(tab==='dash')    renderDash();
  if(tab==='report')  renderReport();
  if(tab==='history') renderHistory();
}
function goBack(){ switchTab('dash'); }

// ═══════════════════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════════════════
function selRole(){ /* no-op (single role only) */ }
function doLogin(){
  const name=(document.getElementById('l-name').value||'').trim();
  const pwd =(document.getElementById('l-pwd').value||'').trim();
  if(!name){ toast('请输入姓名'); return; }
  if(!pwd) { toast('请输入密码'); return; }
  loginRole='staff';
  if(staffList.length>0){
    const found=staffList.find(s=>s.name===name);
    if(!found){ toast('员工不存在，请联系管理员添加'); return; }
    const u = normalizeStaff(found);
    if(u.disabled){ toast('该账号已被禁用，请联系管理员'); return; }
    if(u.pwd!==pwd){ toast('密码错误'); return; }
  } else {
    if(pwd!=='1234'){ toast('员工密码错误（默认 1234）'); return; }
  }
  currentUser=name; currentRole='staff';
  localStorage.setItem('cfr_user', JSON.stringify({name,role:'staff'}));
  renderDash(); show('sdash');
}
function adminLogout(){
  localStorage.removeItem('cfr_user');
  currentUser=''; currentRole='staff';
  document.getElementById('l-name').value='';
  document.getElementById('l-pwd').value='';
  selRole('staff');
  show('sl');
}

// ═══════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════
function renderDash(){
  const now=new Date();
  document.getElementById('d-hi').textContent='你好，'+currentUser;
  document.getElementById('d-dt').textContent=now.toLocaleDateString('zh-CN',
    {year:'numeric',month:'long',day:'numeric',weekday:'long'});
  let pend=0,norm=0,abn=0;
  ROOM_DEFS.forEach(r=>{
    const s=(roomData[r.num]||{}).status||'pending';
    if(s==='pending'||s==='progress') pend++;
    else if(s==='normal') norm++;
    else if(s==='abnormal') abn++;
  });
  document.getElementById('st-total').textContent=ROOM_DEFS.length;
  document.getElementById('st-pend').textContent=pend;
  document.getElementById('st-norm').textContent=norm;
  document.getElementById('st-abn').textContent=abn;
  // grid
  const grid=document.getElementById('room-grid');
  grid.innerHTML=ROOM_DEFS.map(r=>{
    const d=roomData[r.num]||{}, s=d.status||'pending';
    const lbl={pending:'待查',progress:'查房中',normal:'正常',abnormal:'异常'}[s];
    const iss=issueCount(d);
    return `<div class="rc s-${s}" onclick="openRoom('${r.num}')">
      ${iss>0?`<div class="rc-issues">${iss}</div>`:''}
      <div class="rc-num">${r.num}</div>
      <span class="badge b-${s}">${lbl}</span>
    </div>`;
  }).join('');
  // abnormal
  const abl=document.getElementById('ab-list');
  const abns=ROOM_DEFS.filter(r=>(roomData[r.num]||{}).status==='abnormal');
  if(!abns.length){
    abl.innerHTML='<div style="text-align:center;color:var(--g400);font-size:13px;padding:16px 0">✓ 暂无异常房间</div>';
  } else {
    abl.innerHTML=abns.map(r=>{
      const d=roomData[r.num], iss=issueNames(d);
      return `<div class="ab-row" onclick="openRoom('${r.num}')">
        <div class="ab-num">${r.num}</div>
        <div class="ab-info">${iss.slice(0,3).join('、')||'已标记异常'}</div>
        <div class="ab-arr">›</div>
      </div>`;
    }).join('');
  }
}
function issueCount(d){ return d.checks?Object.values(d.checks).filter(v=>v==='issue').length:0; }
function issueNames(d){
  if(!d.checks) return [];
  const names=[];
  CHECK_ITEMS.forEach(item=>{
    if(d.checks[item.id]==='issue') names.push(item.name);
  });
  return names;
}

let curRoom=null, insState={};

function openRoom(num){
  curRoom=num;
  const def=ROOM_DEFS.find(r=>r.num===num);
  const ex=roomData[num]||{};
  insState={
    checks:   Object.assign({},ex.checks||{}),
    inventory:JSON.parse(JSON.stringify(ex.inventory||buildDefaultInventory())),
    photos:   [...(ex.photos||[])],
    remark:   ex.remark||'',
  };
  document.getElementById('ins-title').textContent=`${num}号房 查房`;
  buildInsForm(def);
  show('sinspect');
  if((roomData[num]||{}).status==='pending'){
    roomData[num]=Object.assign({},roomData[num],{status:'progress'});
    saveRooms();
  }
}

function buildDefaultInventory(){
  const inv={};
  products.forEach(p=>{
    inv[p.id]={initial:p.parLevel, remaining:p.parLevel};
  });
  return inv;
}

function buildInsForm(def){

      <div class="room-bar-name">${def.num}号房</div>

      ${{pending:'待查',progress:'查房中',normal:'正常',abnormal:'异常'}[(roomData[def.num]||{}).status||'pending']}

  </div>`;

  // Check items（扁平列表）

    <div class="card-hd">
      <span class="card-hd-icon">📋</span>
      <span class="card-hd-title">查房检查项</span>
      <span class="card-hd-note" id="prog-checks">${done}/${CHECK_ITEMS.length}</span>
    </div>`;
  CHECK_ITEMS.forEach(item=>{
    const v=insState.checks[item.id]||'';
    const icon = item.icon ? `<span style="font-size:20px;margin-right:6px">${item.icon}</span>` : '';
    html+=`<div class="ci">

          <button class="tog ${v==='issue'?'t-issue':''}" onclick="setChk('${item.id}','issue')">✗ 异常</button>
          <button class="tog ${v==='na'?'t-na':''}" onclick="setChk('${item.id}','na')">— 无此项</button>
        </div>

  });

  // ── Inventory section ──
  html+=`<div class="card">
    <div class="card-hd">
      <span class="card-hd-icon">📦</span>
      <span class="card-hd-title">零食 / 饮料盘点</span>

            <th>消费</th>
            <th>金额</th>

  products.forEach(p=>{

    html+=invRow(p,inv.initial,inv.remaining,con);
  });
  html+=`</tbody></table>
    </div>
    <div class="inv-footer">
      <span class="inv-total-lbl">本次消费合计</span>

function invRow(p,initial,remaining,con){
  const amt=con*p.price;
  return `<tr id="inv-row-${p.id}">
    <td class="left"><span style="font-size:16px">${p.icon}</span> ${p.name}</td>
    <td><span style="font-weight:600;color:var(--g600)">${initial}</span></td>
    <td><input class="inv-num-in" id="inv-rem-${p.id}" type="number" min="0" max="${initial}"
        value="${remaining}" oninput="updateInvRow('${p.id}',${initial},${p.price})"></td>
    <td><span class="inv-consumed ${con>0?'pos':'zero'}" id="inv-con-${p.id}">${con}</span></td>
    <td><span class="inv-price" id="inv-amt-${p.id}">${amt>0?'¥'+amt:'-'}</span></td>
  </tr>`;
}

function updateInvRow(pid,initial,price){
  const inp=document.getElementById('inv-rem-'+pid);
  let rem=parseInt(inp.value)||0;
  rem=Math.max(0,Math.min(initial,rem));
  inp.value=rem;
  const con=initial-rem;
  const amt=con*price;
  insState.inventory[pid]={initial,remaining:rem};
  document.getElementById('inv-con-'+pid).textContent=con;
  document.getElementById('inv-con-'+pid).className='inv-consumed '+(con>0?'pos':'zero');
  document.getElementById('inv-amt-'+pid).textContent=amt>0?'¥'+amt:'-';
  const total=calcInvTotal();
  document.getElementById('inv-total-val').textContent='¥'+total;
  document.getElementById('inv-total-chip').textContent='合计 ¥'+total;
}

function calcInvTotal(){
  return products.reduce((s,p)=>{
    const inv=insState.inventory[p.id];
    if(!inv) return s;
    return s+Math.max(0,inv.initial-inv.remaining)*p.price;
  },0);
}

function setChk(id,val){
  insState.checks[id]=val;
  // update toggle buttons
  document.querySelectorAll(`[onclick*="'${id}'"]`).forEach(btn=>{
    btn.className='tog';
    const v=btn.getAttribute('onclick').match(/'(ok|issue|na)'/)[1];
    if(v===val) btn.className='tog t-'+({'ok':'ok','issue':'issue','na':'na'}[val]);
  });
  // update overall progress
  const done=CHECK_ITEMS.filter(i=>insState.checks[i.id]).length;
  const el=document.getElementById('prog-checks');
  if(el) el.textContent=done+'/'+CHECK_ITEMS.length;
}

function tmpSave(){
  doSaveState('progress'); toast('已暂存');
}

function doSaveState(status){
  insState.remark=(document.getElementById('remark-in')||{}).value||insState.remark;
  roomData[curRoom]={
    ...roomData[curRoom], status,
    checks:   {...insState.checks},
    inventory:JSON.parse(JSON.stringify(insState.inventory)),
    photos:   [...insState.photos],
    remark:   insState.remark,
    time:     new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}),
    staff:    currentUser,
  };
  saveRooms();
}

function doSubmit(result){
  const hasIssue=result==='abnormal'||Object.values(insState.checks).includes('issue');
  const total=calcInvTotal();
  const body=result==='normal'
    ?`确认 ${curRoom} 号房查房完成？${total>0?`<br><br>⚠ 本次消费 <b>¥${total}</b>，请确保已向客人收取。`:''}`
    :`确认将 ${curRoom} 号房标记为异常？<br>请确保已拍照或备注记录问题。`;
  openConfirm(result==='normal'?'确认查房完成':'标记异常房间', body, ()=>{
    doSaveState(result);
    // deduct from warehouse stock
    products.forEach(p=>{
      const inv=insState.inventory[p.id];
      if(!inv) return;
      const con=Math.max(0,inv.initial-inv.remaining);
      if(con>0){
        stockData[p.id]=Math.max(0,(stockData[p.id]||0)-con);
        consumed[p.id]=(consumed[p.id]||0)+con;
      }
    });
    saveAdmin();
    pushHistory();
    toast(result==='normal'?`✓ ${curRoom}号房 完成`:`⚠ ${curRoom}号房 已标记异常`);
    goBack();
  });
}

function pushHistory(){
  const today=todayKey();
  const ex=history.find(h=>h.date===today);
  const rooms=Object.keys(roomData).filter(k=>['normal','abnormal'].includes(roomData[k].status));
  if(ex){ ex.rooms=rooms; ex.staff=currentUser; }
  else history.unshift({date:today,staff:currentUser,rooms});
  localStorage.setItem('cfr_history',JSON.stringify(history.slice(0,90)));
}

function renderReport(){
  const body=document.getElementById('rpt-body');
  const done=ROOM_DEFS.filter(r=>['normal','abnormal'].includes((roomData[r.num]||{}).status));
  const norms=done.filter(r=>roomData[r.num].status==='normal');
  const abns =done.filter(r=>roomData[r.num].status==='abnormal');
  const totalRev=done.reduce((s,r)=>{
    const d=roomData[r.num]; if(!d||!d.inventory) return s;
    return s+products.reduce((ss,p)=>{
      const inv=d.inventory[p.id]; if(!inv) return ss;
      return ss+Math.max(0,inv.initial-inv.remaining)*p.price;
    },0);
  },0);
  let html=`<div class="rpt-sum">
    <div class="rpt-title">今日查房报告</div>
    <div class="rpt-dt">${new Date().toLocaleDateString('zh-CN',
      {year:'numeric',month:'long',day:'numeric'})} · ${currentUser}</div>
    <div class="rpt-nums">
      <div class="rpt-ni"><div class="rpt-nv">${done.length}</div><div class="rpt-nl">已查</div></div>
      <div class="rpt-ni"><div class="rpt-nv">${norms.length}</div><div class="rpt-nl">正常</div></div>
      <div class="rpt-ni"><div class="rpt-nv" style="color:#fca5a5">${abns.length}</div><div class="rpt-nl">异常</div></div>
      <div class="rpt-ni"><div class="rpt-nv" style="color:#fbbf24">¥${totalRev}</div><div class="rpt-nl">消费额</div></div>
    </div>
  </div>`;

  if(!done.length){
    html+=`<div class="empty"><div class="empty-icon">📋</div><div>今日暂无查房记录</div></div>`;
  } else {
    [...abns,...norms].forEach(r=>{
      const d=roomData[r.num];
      const iss=issueNames(d);
      const rev=products.reduce((s,p)=>{
        const inv=d.inventory&&d.inventory[p.id]; if(!inv) return s;
        return s+Math.max(0,inv.initial-inv.remaining)*p.price;
      },0);
      html+=`<div class="rpt-card">
        <div class="rpt-ch">
          <div class="rpt-cn" style="color:${d.status==='abnormal'?'var(--r)':'var(--g)'}">${r.num}号房</div>
          <span class="badge b-${d.status}">${d.status==='normal'?'正常':'异常'}</span>
        </div>
        <div class="rpt-cb">
          ${iss.length?iss.map(n=>`<div class="rpt-iss">⚠ ${n} 异常</div>`).join(''):'<div class="rpt-ok">✓ 电器卫生全部正常</div>'}
          ${rev>0?`<div style="font-size:12px;color:var(--o);margin-top:4px">🍫 消费 ¥${rev}</div>`:''}
          ${d.remark?`<div style="font-size:12px;color:var(--g500);margin-top:4px">备注：${d.remark}</div>`:''}
          ${d.photos&&d.photos.length?`<div class="rpt-photos">${d.photos.map(p=>`<img class="rpt-photo" src="${p}">`).join('')}</div>`:''}
          <div style="font-size:11px;color:var(--g400);margin-top:6px">${d.time} · ${d.staff}</div>
        </div>
      </div>`;
    });
  }
  body.innerHTML=html;
}

function shareReport(){
  const done=ROOM_DEFS.filter(r=>['normal','abnormal'].includes((roomData[r.num]||{}).status));
  const abns=ROOM_DEFS.filter(r=>(roomData[r.num]||{}).status==='abnormal');
  const rev=done.reduce((s,r)=>{
    const d=roomData[r.num]; if(!d||!d.inventory) return s;
    return s+products.reduce((ss,p)=>{
      const inv=d.inventory[p.id]; if(!inv) return ss;
      return ss+Math.max(0,inv.initial-inv.remaining)*p.price;
    },0);
  },0);
  let t=`【查房日报】${new Date().toLocaleDateString('zh-CN')}\n查房人：${currentUser}\n`;
  t+=`已查：${done.length}/${ROOM_DEFS.length} 间\n`;
  if(abns.length){
    t+=`\n⚠ 异常房间：\n`;
    abns.forEach(r=>{ t+=`  ${r.num}号：${issueNames(roomData[r.num]).join('、')||'已标记异常'}\n`; });
  } else { t+=`✓ 无异常房间\n`; }
  if(rev>0) t+=`\n🍫 零食/饮料消费合计：¥${rev}`;
  if(navigator.share){ navigator.share({title:'查房日报',text:t}); }
  else if(navigator.clipboard){ navigator.clipboard.writeText(t).then(()=>toast('已复制，请粘贴发送')); }
  else { openConfirm('发群内容',t.replace(/\n/g,'<br>'),()=>{}); }
}

  setSyncDot('syncing');
  try{
    const [rSnap, pSnap, dSnap, sSnap, cSnap] = await Promise.all([
      db.doc(FSP.rooms).get(),
      db.doc(FSP.products).get(),
      db.doc(FSP.daily(todayKey())).get(),
      db.doc(FSP.staff).get(),
      db.doc(FSP.checkItems).get(),
    ]);
    if(rSnap.exists){ const d=rSnap.data(); if(Array.isArray(d.defs)&&d.defs.length) ROOM_DEFS=d.defs; }
    if(pSnap.exists){
      const d=pSnap.data();
      if(Array.isArray(d.items)&&d.items.length) products=d.items;
      if(d.stock) stockData=d.stock;
    }
    if(sSnap.exists){ const d=sSnap.data(); if(Array.isArray(d.list)) staffList=d.list; }
    if(cSnap.exists){ const d=cSnap.data(); if(Array.isArray(d.items)&&d.items.length) CHECK_ITEMS=d.items; }
    if(dSnap.exists){
      const d=dSnap.data();
      // Merge: keep local photos, use cloud status/checks/inventory
      if(d.rooms){
        Object.keys(d.rooms).forEach(num=>{
          const localPhotos = (roomData[num]||{}).photos || [];
          roomData[num] = {...(roomData[num]||{}), ...d.rooms[num], photos: localPhotos};
        });
      }
      if(d.consumed) consumed=d.consumed;
    }
    ROOM_DEFS.forEach(r=>{ if(!roomData[r.num]) roomData[r.num]={status:'pending'}; });
    setSyncDot('online');
  }catch(e){
    console.error('fsLoadAll:', e);
    setSyncDot('error');
  }
}

// ── Real-time listener for today's room data ──
function setupFsListeners(){
  if(!db) return;
  if(_fsListener){ _fsListener(); _fsListener=null; }
  _fsListener = db.doc(FSP.daily(todayKey())).onSnapshot(snap=>{
    if(!snap.exists||!snap.metadata.hasPendingWrites){
      // Remote update (not our own write)
      if(snap.exists){
        const d=snap.data();
        if(d.rooms){
          Object.keys(d.rooms).forEach(num=>{
            const localPhotos=(roomData[num]||{}).photos||[];
            roomData[num]={...(roomData[num]||{}),...d.rooms[num],photos:localPhotos};
          });
        }
        if(d.consumed) consumed=d.consumed;
        localStorage.setItem('cfr_rooms_'+todayKey(), JSON.stringify(roomData));
      }
      // Refresh visible screens
      const dashEl=document.getElementById('sdash');
      const rptEl =document.getElementById('sreport');
      if(dashEl&&dashEl.classList.contains('active')) renderDash();
      if(rptEl &&rptEl .classList.contains('active')) renderReport();
    }
    setSyncDot('online');
  }, err=>{ console.error('FS listener:', err); setSyncDot('error'); });
}

// ── Firestore write helpers (fire-and-forget) ──
async function fsSyncRooms(){
  if(!db) return;
  setSyncDot('syncing');
  // Strip photos before uploading (too large)
  const stripped = {};
  Object.keys(roomData).forEach(k=>{
    const r={...roomData[k]}; delete r.photos; stripped[k]=r;
  });
  await db.doc(FSP.daily(todayKey())).set({rooms: stripped},{merge:true});
  setSyncDot('online');
}

async function fsSyncAdmin(){
  if(!db) return;
  setSyncDot('syncing');
  await Promise.all([
    db.doc(FSP.products).set({items:products, stock:stockData}),
    db.doc(FSP.daily(todayKey())).set({consumed},{merge:true}),
  ]);
  setSyncDot('online');
}

async function fsSyncRoomDefs(){
  if(!db) return;
  await db.doc(FSP.rooms).set({defs:ROOM_DEFS});
}

async function fsSyncStaff(){
  if(!db) return;
  await db.doc(FSP.staff).set({list:staffList});
}

async function fsSyncCheckItems(){
  if(!db) return;
  await db.doc(FSP.checkItems).set({items:CHECK_ITEMS});
}

// ── Firebase config UI ──

function parseFbConfigText(raw){
  // Accept: plain key:value lines, JSON object, or full firebaseConfig = {...}
  let clean = raw.trim();
  // Extract content inside braces if present
  const m = clean.match(/\{([\s\S]*)\}/);
  if(m) clean = m[1];
  // Convert JS object literals to JSON
  clean = clean
    .replace(/\/\/.*$/gm,'')          // remove // comments
    .replace(/,\s*$/,'')              // trailing comma
    .replace(/([{,]\s*)(\w+)\s*:/g,'$1"$2":') // quote keys
    .replace(/:\s*"([^"]*)"/g, (_, v) => `:"${v}"`) // keep quoted
    .replace(/:\s*([^",\n\{\}]+)/g, (full, v) => { // quote bare values
      v=v.trim(); if(v==='true'||v==='false'||v==='null'||!isNaN(v)) return ':'+v;
      return `:"${v}"`;
    });
  try{ return JSON.parse('{'+clean+'}'); }catch(e){ return null; }
}

// Try to init Firebase if config stored, then re-render with cloud data
const _fbCfg = getFbStoredConfig();
if(_fbCfg && typeof firebase !== 'undefined'){
  initFirebase(_fbCfg).then(ok=>{
    if(ok){
      fsLoadAll().then(()=>{
        afterLoad();
        setupFsListeners();
      });
    } else {
      afterLoad();
    }
  });
} else {
  afterLoad();
}
